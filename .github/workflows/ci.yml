name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        build-type:
          - Debug

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1-mesa-dev \
            libfreetype-dev \
            libharfbuzz-dev \
            libgl1-mesa-dev \
            libudev-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev

      - name: Configure CMake
        run: >
          cmake
          -S .
          -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build-type }}
          -DCHESSPP_BUILD_TESTS=ON
          -DCMAKE_CXX_STANDARD=20
          -DCMAKE_CXX_STANDARD_REQUIRED=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build-type }}

      - name: Run tests
        if: runner.os != 'Windows'
        run: ctest --test-dir build --build-config ${{ matrix.build-type }} --output-on-failure

      - name: Run tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $buildDir = Join-Path $PWD "build"
          $config = "${{ matrix.build-type }}"
          $paths = @(
            (Join-Path $buildDir "bin\$config"),
            (Join-Path $buildDir "lib\$config"),
            (Join-Path $buildDir "_deps\googletest-build\bin\$config"),
            (Join-Path $buildDir "_deps\googletest-build\lib\$config"),
            (Join-Path $buildDir "_deps\sfml-build\bin\$config"),
            (Join-Path $buildDir "_deps\sfml-build\lib\$config")
          )
          $env:PATH = ($paths -join [IO.Path]::PathSeparator) + [IO.Path]::PathSeparator + $env:PATH
          ctest --test-dir build --build-config $config --output-on-failure
